# Example Prometheus scrape config fragment for NetBox HTTP SD.
#
# Replace <device-template-id> / <service-template-id> with the numeric IDs
# assigned by NetBox after creating the export templates (visible in the
# Customization → Export Templates UI or via /api/extras/export-templates/).
#
# The render endpoint requires authentication if the NetBox instance has
# LOGIN_REQUIRED enabled — pass a token via the Authorization header through
# Prometheus' http_sd_configs basic_auth/authorization block.

scrape_configs:
  # ----- Devices: primary IP (node_exporter / snmp_exporter / etc.) -----
  - job_name: netbox-sd-devices
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/dcim/devices/?export=prometheus-device
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: &device_relabel
      # Preserve the probed device address as `instance` when exporter routing
      # is in use; otherwise __param_target is unset and this is a no-op.
      - source_labels: [__param_target]
        target_label: instance
        regex: (.+)

  # ----- Devices: OOB IP (iDRAC / iLO / BMC) -----
  # Separate export template (device-oob-prometheus-sd.j2, ?export=prometheus-device-oob)
  # driven by the `prometheus-export-template-oob` config-context key. Same relabel
  # as the primary job — iDRAC/iLO typically ride an exporter, so __param_target is
  # set and `instance` is preserved.
  - job_name: netbox-sd-devices-oob
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/dcim/devices/?export=prometheus-device-oob
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: *device_relabel

  # ----- Services (direct scrape) -----
  # The service template emits direct-scrape targets (`<parent IP>:<port>`, or
  # the verbatim `prometheus_scrape_url` custom field value) with labels
  # pre-named. Prometheus scrapes the target as-is — no relabel required.
  - job_name: netbox-sd-services
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/ipam/services/?export=prometheus-service
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"

  # ----- Services behind a shared multi-target exporter (e.g. snmp_exporter) -----
  # Same service SD endpoint, narrowed to the relevant services with a tag
  # filter. The exporter routing lives entirely here: the SD target (`host:port`)
  # is moved into __param_target and __address__ is rewritten to the exporter, so
  # Prometheus hits the exporter with ?target=<service host:port>. `module` (and
  # any other per-target param) can be lifted from a NetBox label the template
  # emits, or set statically below. This mirrors the blackbox jobs' relabel shape.
  - job_name: netbox-sd-services-snmp
    metrics_path: /snmp
    params:
      module: [if_mib]          # static fallback; overridden per-service below
      auth: [public_v2]         # static fallback; overridden per-service below
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/ipam/services/?export=prometheus-service&tag=snmp
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter.internal.lgfl.net:9116
      # Per-service module/auth from NetBox custom fields. The service template
      # emits these as __meta_* labels; lift them into the snmp_exporter params.
      # regex (.+) means the rule only fires when the CF is set, so the static
      # params above remain the default for services that don't override.
      - source_labels: [__meta_prometheus_exporter_modules]
        target_label: __param_module
        regex: (.+)
      - source_labels: [__meta_prometheus_exporter_auth]
        target_label: __param_auth
        regex: (.+)

  # ----- Blackbox probes -----
  # The blackbox exporter runs on the local Prometheus host. Each blackbox job
  # below shares the same swap: SD emits `targets: [<probe-target>]` and
  # `labels: {module: ...}`; this relabel moves the probe target to
  # __param_target, the module label to __param_module, and rewrites
  # __address__ to the blackbox exporter. metrics_path: /probe is the blackbox
  # endpoint.
  #
  # Filter the SD URL with `&tag=<tag>` to narrow probing to a subset of
  # objects. Without a tag filter, every active object is probed.

  - job_name: netbox-blackbox-devices
    metrics_path: /probe
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/dcim/devices/?export=blackbox-prometheus-sd
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: &blackbox_relabel
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [module]
        target_label: __param_module
      - target_label: __address__
        replacement: localhost:9115

  - job_name: netbox-blackbox-vms
    metrics_path: /probe
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/virtualization/virtual-machines/?export=blackbox-prometheus-sd
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: *blackbox_relabel

  - job_name: netbox-blackbox-services
    metrics_path: /probe
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/ipam/services/?export=blackbox-prometheus-sd
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: *blackbox_relabel

  - job_name: netbox-blackbox-ipaddresses
    metrics_path: /probe
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/ipam/ip-addresses/?export=blackbox-prometheus-sd
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: *blackbox_relabel
