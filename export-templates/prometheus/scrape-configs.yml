# Example Prometheus scrape config fragment for NetBox HTTP SD.
#
# Replace <device-template-id> / <service-template-id> with the numeric IDs
# assigned by NetBox after creating the export templates (visible in the
# Customization → Export Templates UI or via /api/extras/export-templates/).
#
# The render endpoint requires authentication if the NetBox instance has
# LOGIN_REQUIRED enabled — pass a token via the Authorization header through
# Prometheus' http_sd_configs basic_auth/authorization block.

scrape_configs:
  - job_name: netbox-sd-devices
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/dcim/devices/?export=prometheus-device
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs:
      # Preserve the probed device address as `instance` when exporter routing
      # is in use; otherwise __param_target is unset and this is a no-op.
      - source_labels: [__param_target]
        target_label: instance
        regex: (.+)

  # ----- Blackbox probes -----
  # The blackbox exporter runs on the local Prometheus host. Each blackbox job
  # below shares the same swap: SD emits `targets: [<probe-target>]` and
  # `labels: {module: ...}`; this relabel moves the probe target to
  # __param_target, the module label to __param_module, and rewrites
  # __address__ to the blackbox exporter. metrics_path: /probe is the blackbox
  # endpoint.
  #
  # Filter the SD URL with `&tag=<tag>` to narrow probing to a subset of
  # objects. Without a tag filter, every active object is probed.

  - job_name: netbox-blackbox-devices
    metrics_path: /probe
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/dcim/devices/?export=blackbox-prometheus-sd
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: &blackbox_relabel
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [module]
        target_label: __param_module
      - target_label: __address__
        replacement: localhost:9115

  - job_name: netbox-blackbox-vms
    metrics_path: /probe
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/virtualization/virtual-machines/?export=blackbox-prometheus-sd
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: *blackbox_relabel

  - job_name: netbox-blackbox-services
    metrics_path: /probe
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/ipam/services/?export=blackbox-prometheus-sd
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: *blackbox_relabel

  - job_name: netbox-blackbox-ipaddresses
    metrics_path: /probe
    http_sd_configs:
      - url: https://netbox-dev.internal.lgfl.net/api/ipam/ip-addresses/?export=blackbox-prometheus-sd
        authorization:
          type: "Token"
          credentials: "lOG6F4fhi551ZzbzeY1gPLFmejXx7HAjwQ49lDcG"
    relabel_configs: *blackbox_relabel
